<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Mate de a Dos</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <img src="assets/logo.png" alt="Mate de a Dos" class="sidebar-logo" />
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item" data-page="dashboard">
        <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="4" rx="1"/><rect x="14" y="10" width="7" height="11" rx="1"/><rect x="3" y="13" width="7" height="8" rx="1"/></svg></span>
        Dashboard
      </a>
      <a href="productos.html" class="nav-item" data-page="productos">
        <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></span>
        Productos
      </a>
      <a href="ventas.html" class="nav-item" data-page="ventas">
        <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></span>
        Ventas
      </a>
      <a href="stock.html" class="nav-item" data-page="stock">
        <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
        Stock
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar sesión
      </button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Topbar mobile -->
  <header class="topbar">
    <button class="btn-menu" id="btn-menu">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <img src="assets/logo.png" alt="Mate de a Dos" class="topbar-logo" />
  </header>

  <!-- Main -->
  <main class="main-content">
    <div class="page-header">
      <div>
        <h1>Dashboard</h1>
        <p>Resumen general del emprendimiento</p>
      </div>
      <div id="dash-date" class="text-muted text-sm"></div>
    </div>

    <!-- Metrics -->
    <div class="grid-4" id="metrics-grid">
      <div class="loading"><div class="spinner"></div></div>
    </div>

    <div style="height:24px"></div>

    <!-- ══ SECCIÓN DE GANANCIAS ══ -->
    <div class="card anim-fade-in" style="margin-bottom: 24px">
      <div class="card-header">
        <span class="card-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          Rentabilidad del mes
        </span>
        <span id="profit-month-label" class="badge badge-muted"></span>
      </div>

      <!-- Profit summary row -->
      <div class="profit-summary" id="profit-summary">
        <div class="profit-item">
          <span class="profit-label">Ingresos (ventas)</span>
          <span class="profit-value text-success" id="profit-ingresos">$ 0</span>
        </div>
        <div class="profit-divider">−</div>
        <div class="profit-item">
          <span class="profit-label">Gastos (stock)</span>
          <span class="profit-value text-danger" id="profit-gastos">$ 0</span>
        </div>
        <div class="profit-divider">=</div>
        <div class="profit-item profit-result">
          <span class="profit-label">Ganancia neta</span>
          <span class="profit-value" id="profit-neto">$ 0</span>
        </div>
      </div>

      <div style="height:20px"></div>

      <!-- Form para agregar gasto -->
      <div class="expense-form-wrapper">
        <h4 class="expense-form-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          Registrar gasto de stock
        </h4>
        <form id="form-gasto" class="expense-form">
          <div class="form-group">
            <label class="form-label">Descripción <span class="required">*</span></label>
            <input type="text" class="form-control" id="gasto-desc" placeholder="Ej: Compra de yerba x20" required />
          </div>
          <div class="form-group">
            <label class="form-label">Monto <span class="required">*</span></label>
            <input type="number" class="form-control" id="gasto-monto" placeholder="0" min="0" step="0.01" required />
          </div>
          <div class="form-group">
            <label class="form-label">Fecha</label>
            <input type="date" class="form-control" id="gasto-fecha" />
          </div>
          <div class="form-group" style="align-self: flex-end">
            <button type="submit" class="btn btn-accent">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Agregar
            </button>
          </div>
        </form>
      </div>

      <div style="height:16px"></div>

      <!-- Tabla de gastos -->
      <div id="gastos-list"></div>
    </div>

    <div class="grid-2" style="gap:20px; align-items:start">
      <!-- Últimas ventas -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Últimas ventas
          </span>
          <a href="ventas.html" class="btn btn-outline btn-sm">Ver todo</a>
        </div>
        <div id="ultimas-ventas"><div class="loading"><div class="spinner"></div></div></div>
      </div>

      <!-- Stock bajo -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Stock bajo
          </span>
          <a href="stock.html" class="btn btn-outline btn-sm">Gestionar</a>
        </div>
        <div id="stock-bajo"><div class="loading"><div class="spinner"></div></div></div>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
