<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ventas — Mate de a Dos</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><img src="assets/logo.png" alt="Mate de a Dos" class="sidebar-logo" /></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item" data-page="dashboard"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="productos.html" class="nav-item" data-page="productos"><span class="nav-icon">🧉</span> Productos</a>
      <a href="ventas.html"   class="nav-item" data-page="ventas">  <span class="nav-icon">🛍️</span> Ventas</a>
      <a href="stock.html"    class="nav-item" data-page="stock">   <span class="nav-icon">📦</span> Stock</a>
    </nav>
    <div class="sidebar-footer"><button class="btn-logout" id="btn-logout">↩ Cerrar sesión</button></div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <header class="topbar">
    <button class="btn-menu" id="btn-menu">☰</button>
    <img src="assets/logo.png" alt="Mate de a Dos" class="topbar-logo" />
  </header>

  <main class="main-content">
    <div class="page-header">
      <div><h1>Ventas</h1><p>Registrá ventas y consultá el historial</p></div>
    </div>

    <!-- Formulario nueva venta -->
    <div class="card" style="margin-bottom:24px">
      <div class="card-header"><span class="card-title">🛍️ Nueva venta</span></div>
      <form id="form-venta" class="form-grid">
        <div class="form-group">
          <label class="form-label" for="venta-cliente">Cliente <span class="required">*</span></label>
          <input id="venta-cliente" type="text" class="form-control" placeholder="Nombre del cliente" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="venta-fecha">Fecha <span class="required">*</span></label>
          <input id="venta-fecha" type="date" class="form-control" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="venta-producto">Producto <span class="required">*</span></label>
          <select id="venta-producto" class="form-control" required>
            <option value="">— Seleccioná un producto —</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="venta-cantidad">Cantidad <span class="required">*</span></label>
          <input id="venta-cantidad" type="number" class="form-control" placeholder="1" min="1" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="venta-precio">Precio unitario ($) <span class="required">*</span></label>
          <input id="venta-precio" type="number" class="form-control" placeholder="0" min="0" required />
        </div>
        <div class="form-group">
          <label class="form-label">Total estimado</label>
          <div class="form-control" id="venta-total" style="background:var(--color-surface-2); color:var(--color-accent); font-weight:600">$ 0</div>
        </div>
        <div class="form-group span-2">
          <label class="form-label" for="venta-notas">Notas</label>
          <textarea id="venta-notas" class="form-control" placeholder="Observaciones opcionales…" rows="2"></textarea>
        </div>
        <div style="grid-column:1/-1; display:flex; justify-content:flex-end; gap:8px;">
          <button type="button" class="btn btn-outline" id="btn-limpiar-venta">Limpiar</button>
          <button type="submit" class="btn btn-accent" id="btn-registrar-venta">✅ Registrar venta</button>
        </div>
      </form>
    </div>

    <!-- Historial -->
    <div class="section-title">Historial de ventas</div>

    <div class="filter-bar">
      <div class="form-group">
        <label class="form-label">Cliente</label>
        <input id="f-cliente" type="text" class="form-control" placeholder="Buscar cliente…" />
      </div>
      <div class="form-group">
        <label class="form-label">Producto</label>
        <select id="f-producto" class="form-control">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Desde</label>
        <input id="f-desde" type="date" class="form-control" />
      </div>
      <div class="form-group">
        <label class="form-label">Hasta</label>
        <input id="f-hasta" type="date" class="form-control" />
      </div>
      <button class="btn btn-primary btn-sm" id="btn-filtrar-ventas" style="align-self:flex-end">Filtrar</button>
      <button class="btn btn-outline btn-sm" id="btn-limpiar-filtros" style="align-self:flex-end">Limpiar</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr><th>Fecha</th><th>Cliente</th><th>Producto</th><th>Cant.</th><th>Precio unit.</th><th>Total</th><th>Notas</th></tr>
        </thead>
        <tbody id="tbody-ventas">
          <tr><td colspan="7"><div class="loading"><div class="spinner"></div></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<div id="toast-container"></div>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/ventas.js"></script>
</body>
</html>
