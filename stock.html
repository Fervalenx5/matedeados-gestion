<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock — Mate de a Dos</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><img src="assets/logo.png" alt="Mate de a Dos" class="sidebar-logo" /></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item" data-page="dashboard">
        <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="4" rx="1"/><rect x="14" y="10" width="7" height="11" rx="1"/><rect x="3" y="13" width="7" height="8" rx="1"/></svg></span>
        Dashboard
      </a>
      <a href="productos.html" class="nav-item" data-page="productos">
        <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></span>
        Productos
      </a>
      <a href="ventas.html" class="nav-item" data-page="ventas">
        <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></span>
        Ventas
      </a>
      <a href="stock.html" class="nav-item" data-page="stock">
        <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
        Stock
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar sesión
      </button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <header class="topbar">
    <button class="btn-menu" id="btn-menu">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <img src="assets/logo.png" alt="Mate de a Dos" class="topbar-logo" />
  </header>

  <main class="main-content">
    <div class="page-header">
      <div><h1>Control de Stock</h1><p>Registrá movimientos manuales y consultá el historial</p></div>
    </div>

    <!-- Formulario movimiento manual -->
    <div class="card" style="margin-bottom:24px">
      <div class="card-header">
        <span class="card-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          Registrar movimiento
        </span>
      </div>
      <form id="form-movimiento" class="form-grid">
        <div class="form-group">
          <label class="form-label" for="mov-producto">Producto <span class="required">*</span></label>
          <select id="mov-producto" class="form-control" required>
            <option value="">— Seleccioná un producto —</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="mov-tipo">Tipo de movimiento <span class="required">*</span></label>
          <select id="mov-tipo" class="form-control" required>
            <option value="entrada">Entrada (compra/reposición)</option>
            <option value="salida">Salida (pérdida/retiro)</option>
            <option value="ajuste">Ajuste manual (fijar valor exacto)</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="mov-cantidad">Cantidad <span class="required">*</span></label>
          <input id="mov-cantidad" type="number" class="form-control" placeholder="1" min="1" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="mov-fecha">Fecha</label>
          <input id="mov-fecha" type="date" class="form-control" />
        </div>
        <div class="form-group span-2">
          <label class="form-label" for="mov-motivo">Motivo</label>
          <input id="mov-motivo" type="text" class="form-control" placeholder="Ej: Compra a proveedor, rotura, inventario…" />
        </div>
        <div style="grid-column:1/-1; display:flex; justify-content:flex-end;">
          <button type="submit" class="btn btn-accent" id="btn-guardar-mov">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
            Registrar movimiento
          </button>
        </div>
      </form>
    </div>

    <!-- Historial de movimientos -->
    <div class="section-title">Historial de movimientos</div>

    <div class="filter-bar">
      <div class="form-group">
        <label class="form-label">Producto</label>
        <select id="fmov-producto" class="form-control">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <select id="fmov-tipo" class="form-control">
          <option value="">Todos</option>
          <option value="entrada">Entrada</option>
          <option value="salida">Salida</option>
          <option value="ajuste">Ajuste</option>
          <option value="venta">Venta</option>
        </select>
      </div>
      <button class="btn btn-primary btn-sm" id="btn-filtrar-mov" style="align-self:flex-end">Filtrar</button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr><th>Fecha</th><th>Producto</th><th>Tipo</th><th>Cantidad</th><th>Stock ant.</th><th>Stock nuevo</th><th>Motivo</th></tr>
        </thead>
        <tbody id="tbody-movimientos">
          <tr><td colspan="7"><div class="loading"><div class="spinner"></div></div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<div id="toast-container"></div>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/stock.js"></script>
</body>
</html>
